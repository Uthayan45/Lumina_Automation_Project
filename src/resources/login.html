<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lumina Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="background-color: var(--color-secondary);">
    <nav class="navbar">
        <div class="container" style="display:flex; justify-content:center; width:100%;">
            <div class="nav-brand"><a href="index.html">Lumina.</a></div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-header">
            <h2 id="login-title">Welcome Back</h2>
            <p class="text-muted">Sign in to your Lumina account</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="email" >Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <div style="display:flex;justify-content:space-between;">
                    <label class="form-label" for="password">Password</label>
                    <a href="#" style="font-size:0.8rem;color:var(--color-text-muted);">Forgot?</a>
                </div>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                <div id="login-error" class="form-error" style="display:none;"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="login-btn" style="margin-top:1rem;">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="#">Create one</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        if(localStorage.getItem('lumina_user')) {
            document.querySelector('.auth-container').innerHTML = `
                <div style="text-align:center;">
                    <h3>You are already logged in as ${localStorage.getItem('lumina_user')}.</h3>
                    <a href="index.html" class="btn btn-outline" style="margin-top:1rem;">Go Home</a>
                </div>
            `;
        }
    </script>
</body>
</html>
