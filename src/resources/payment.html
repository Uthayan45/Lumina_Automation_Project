<!DOCTYPE html>
<html>
<body style="font-family: Arial; padding: 10px; background: #fafafa;">
<h3>Credit Card Details</h3>

<input type="text" id="cc-number" placeholder="Card Number"
       style="padding:8px; width:100%; box-sizing:border-box; margin-bottom:10px;">

<input type="text" id="cc-exp" placeholder="MM/YY"
       style="padding:8px; width:48%; margin-right:2%;">

<input type="text" id="cc-cvc" placeholder="CVC"
       style="padding:8px; width:48%;">

<button id="validate-btn"
        style="padding:8px; background:#000; color:#fff; width:100%; margin-top:10px; border:none;">
    Validate Card
</button>

<p id="payment-status" style="color:green; font-weight:bold;"></p>

<script>
    document.getElementById('validate-btn').addEventListener('click', function () {
        const cardNumber = document.getElementById('cc-number').value.trim();
        const expiry = document.getElementById('cc-exp').value.trim();
        const cvc = document.getElementById('cc-cvc').value.trim();
        const status = document.getElementById('payment-status');

        if (cardNumber !== "" && expiry !== "" && cvc !== "") {
            status.textContent = "Card Validated!";
        } else {
            status.textContent = "Please fill all card details";
            status.style.color = "red";
        }
    });
</script>
</body>
</html>
